<!DOCTYPE html>
<html>
<head>
    <title>TerminKO | Admin</title>
    <link rel="stylesheet" href="/css/admin-style.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <a href="/"><div class="logo">Zakaži<span>SE</span></div></a>
            <nav><a href="/" class="active">📊 Dashboard</a><a href="/usluge">🛠️ Usluge</a><a href="/rezervacija">📚 Rezervacija</a></nav>
        </aside>
        <main class="main-content">
            <header style="display:flex; justify-content:space-between; margin-bottom:2rem;">
                <h1>Dashboard</h1><button class="btn-primary" id="openModalBtn">+ Novi termin</button>
            </header>
            <div class="stats-grid">
                <div class="stat-card"><p>PRIHOD</p><h3 id="stat-revenue">0 RSD</h3></div>
                <div class="stat-card"><p>KLIJENTI</p><h3 id="stat-customers">0</h3></div>
                <div class="stat-card"><p>UKUPNO</p><h3 id="stat-total">0</h3></div>
            </div>
            <div id="appointment-list"></div>
        </main>
    </div>
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <h2>Novi termin</h2>
            <input type="text" id="custName" placeholder="Ime klijenta">
            <select id="serviceSelect"></select>
            <input type="date" id="appDate"><input type="time" id="appTime">
            <button class="btn-primary" id="saveBtn">Sačuvaj</button>
            <button onclick="document.getElementById('modalOverlay').style.display='none'" style="background:none; border:none; color:white; cursor:pointer; margin-top:10px; width:100%;">Odustani</button>
        </div>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
