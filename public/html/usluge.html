<!DOCTYPE html>
<html>
<head>
    <title>TerminKO | Usluge</title>
    <link rel="stylesheet" href="/css/admin-style.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <a href="/"><div class="logo">Zakaži<span>SE</span></div></a>
            <nav>
                <a href="/">📊 Dashboard</a>
                <a href="/usluge" class="active">🛠️ Usluge</a>
                <a href="/majstori">👨‍🔧 Majstori</a>
                <a href="/raspored">📅 Raspored</a>
                <a href="/rezervacija" target = "_blank">📚 Rezervacija</a>
            </nav>
        </aside>
        <main class="main-content">
            <header style="display:flex; justify-content:space-between; margin-bottom:2rem;">
                <h1>Usluge</h1>
                <div>
                    <button class="btn-primary" id="openModalBtnServices" style="margin-right: 10px;">+ Novi termin</button>
                    <button class="btn-primary" onclick="document.getElementById('modalOverlay').style.display='flex'">+ Nova usluga</button>
                </div>
            </header>
            <div id="services-list"></div>
        </main>
    </div>

    <!-- Modal za novu uslugu -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <h2>Dodaj uslugu</h2>
            <input type="text" id="sName" placeholder="Naziv">
            <input type="number" id="sPrice" placeholder="Cena">
            <button class="btn-primary" onclick="saveService()">Sačuvaj</button>
        </div>
    </div>

    <!-- Modal za novi termin -->
    <div id="appointmentModalOverlay" class="modal-overlay">
        <div class="modal-content">
            <h2>Novi termin</h2>
            <input type="text" id="custName" placeholder="Ime klijenta">
            <select id="serviceSelect"></select>
            <select id="masterSelectServices">
                <option value="">Izaberite majstora (opciono)</option>
            </select>
            <input type="date" id="appDate">
            <input type="time" id="appTime">
            <button class="btn-primary" id="saveAppointmentBtn">Sačuvaj</button>
            <button onclick="document.getElementById('appointmentModalOverlay').style.display='none'" style="background:none; border:none; color:white; cursor:pointer; margin-top:10px; width:100%;">Odustani</button>
        </div>
    </div>

    <script src="/js/usluge.js"></script>
</body>
</html>
