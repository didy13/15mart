<!DOCTYPE html>
<html>
<head>
    <title>Zakaži | TerminKO</title>
    <link rel="stylesheet" href="client-style.css">
</head>
<body>
    <div class="client-card">
        <div class="logo">Zakaži<span>SE</span></div>
        <div id="booking-form">
            <input type="text" id="cName" placeholder="Vaše ime">
            <select id="cService"></select>
            <input type="date" id="cDate"><input type="time" id="cTime">
            <button class="btn-book" onclick="book()">Potvrdi</button>
        </div>
        <div id="success-msg"><h2>Uspešno! 🎉</h2><button onclick="location.reload()" style="background:none; border:1px solid #27272a; color:white; padding:10px; border-radius:10px; margin-top:20px; cursor:pointer; width:100%;">Zakaži ponovo</button></div>
    </div>
    <script src="rezervacija.js"></script>
</body>
</html>
