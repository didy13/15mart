<!DOCTYPE html>
<html>
<head>
    <title>TerminKO | Usluge</title>
    <link rel="stylesheet" href="/css/admin-style.css">

</head>
<body>

        <aside class="sidebar">
            <a href="/"><div class="logo">Zakaži<span>SE</span></div></a>
            <nav><a href="/">📊 Dashboard</a><a href="/usluge" class="active">🛠️ Usluge</a><a href="/rezervacija">📚 Rezervacija</a></nav>
        </aside>
        <main class="main-content">
            <header style="display:flex; justify-content:space-between; margin-bottom:2rem;">

        <div class="modal-content">
            <h2>Dodaj uslugu</h2>
            <input type="text" id="sName" placeholder="Naziv"><input type="number" id="sPrice" placeholder="Cena">
            <button class="btn-primary" onclick="saveService()">Sačuvaj</button>
        </div>
    </div>
    <script src="/js/usluge.js"></script>
